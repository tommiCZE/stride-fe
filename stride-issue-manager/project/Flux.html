<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Flux — Jira alternativa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  html, body, #root { height: 100%; margin: 0; padding: 0; }
  body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
         font-feature-settings: 'cv11', 'ss01', 'ss03'; overflow: hidden; }
  @keyframes fluxPulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.6; transform: scale(1.4); }
  }
  kbd { font-family: 'JetBrains Mono', ui-monospace, monospace; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script crossorigin src="https://unpkg.com/@emotion/react@11.11.4/dist/emotion-react.umd.min.js"></script>
<script crossorigin src="https://unpkg.com/@emotion/styled@11.11.5/dist/emotion-styled.umd.min.js"></script>
<script crossorigin src="https://unpkg.com/@mui/material@5.16.7/umd/material-ui.development.js"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="theme.jsx"></script>
<script type="text/babel" src="shell.jsx"></script>
<script type="text/babel" src="board.jsx"></script>
<script type="text/babel" src="editor.jsx"></script>
<script type="text/babel" src="detail.jsx"></script>
<script type="text/babel" src="views.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>

<script type="text/babel">
const { useState, useEffect, useRef } = React;
const { ThemeProvider, CssBaseline, Box } = window.MaterialUI;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "dark",
  "boardVariant": "standard",
  "density": "comfy",
  "primary": "#7964f4"
}/*EDITMODE-END*/;

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const theme = React.useMemo(() => buildFluxTheme(t.theme, t.density, t.primary), [t.theme, t.density, t.primary]);

  const [route, setRoute] = useState({ view: 'dashboard' });
  const [currentProject, setCurrentProject] = useState('p1');
  const [openTaskId, setOpenTaskId] = useState(null);
  const [showCreate, setShowCreate] = useState(false);
  const [mobileNavOpen, setMobileNavOpen] = useState(false);

  // Timer
  const [timer, setTimer] = useState({ taskKey: 'WEB-142', running: false, elapsed: 4 * 3600 + 32 * 60 });
  useEffect(() => {
    if (!timer.running) return;
    const id = setInterval(() => setTimer(t => ({ ...t, elapsed: t.elapsed + 1 })), 1000);
    return () => clearInterval(id);
  }, [timer.running]);

  const timerApi = {
    ...timer,
    start: (key) => setTimer(t => t.taskKey === key && t.running ? { ...t, running: false } : { taskKey: key, running: true, elapsed: t.taskKey === key ? t.elapsed : 0 }),
    toggle: () => setTimer(t => ({ ...t, running: !t.running })),
    stop: () => setTimer({ taskKey: null, running: false, elapsed: 0 }),
  };

  const proj = getProject(currentProject);
  const navValue = { route, setRoute, currentProject, setCurrentProject,
    openCreate: () => setShowCreate(true) };

  const showProjectChrome = !['dashboard', 'inbox', 'mywork', 'reports'].includes(route.view) || route.view === 'reports' && false;
  const isGlobalView = ['dashboard', 'inbox', 'mywork'].includes(route.view) || (route.view === 'reports' && !proj);

  return (
    <ThemeProvider theme={theme}>
      <CssBaseline/>
      <NavCtx.Provider value={navValue}>
        <Box sx={{ display: 'flex', height: '100vh', bgcolor: 'background.default' }}>
          <Sidebar mobileOpen={mobileNavOpen} onMobileClose={() => setMobileNavOpen(false)}/>
          <Box sx={{ flex: 1, display: 'flex', flexDirection: 'column', minWidth: 0 }}>
            <GlobalHeader timer={timerApi}
              theme={t.theme}
              onThemeToggle={() => setTweak('theme', t.theme === 'dark' ? 'light' : 'dark')}
              onMenuClick={() => setMobileNavOpen(true)}/>

            {/* Global views */}
            {route.view === 'dashboard' && (
              <Dashboard
                onProjectClick={(pid) => { setCurrentProject(pid); setRoute({ view: 'board' }); }}
                onTaskClick={(id) => setOpenTaskId(id)}/>
            )}
            {route.view === 'inbox' && <InboxView onTaskClick={(id) => setOpenTaskId(id)}/>}
            {route.view === 'mywork' && <MyWorkView onTaskClick={(id) => setOpenTaskId(id)}/>}

            {/* Project views */}
            {['board', 'backlog', 'list', 'reports', 'settings'].includes(route.view) && (
              <>
                <ProjectTopbar project={proj}/>
                {route.view === 'board' && (
                  <KanbanBoard projectId={currentProject} variant={t.boardVariant}
                    onTaskClick={(id) => setOpenTaskId(id)}/>
                )}
                {route.view === 'backlog' && (
                  <Backlog projectId={currentProject} onTaskClick={(id) => setOpenTaskId(id)}/>
                )}
                {route.view === 'list' && (
                  <ListView projectId={currentProject} onTaskClick={(id) => setOpenTaskId(id)}/>
                )}
                {route.view === 'reports' && <Reports projectId={currentProject}/>}
                {route.view === 'settings' && <Settings project={proj}/>}
              </>
            )}
          </Box>
        </Box>

        {openTaskId && (
          <TaskDetail taskId={openTaskId} onClose={() => setOpenTaskId(null)} timer={timerApi}/>
        )}
        {showCreate && (
          <CreateTaskModal projectId={currentProject} onClose={() => setShowCreate(false)}/>
        )}

        <TweaksPanel>
          <TweakSection label="Vzhled"/>
          <TweakRadio label="Téma" value={t.theme} options={['light', 'dark']}
                      onChange={(v) => setTweak('theme', v)}/>
          <TweakRadio label="Hustota" value={t.density} options={['compact', 'comfy']}
                      onChange={(v) => setTweak('density', v)}/>
          <TweakColor label="Primární" value={t.primary}
                      onChange={(v) => setTweak('primary', v)}/>
          <TweakSection label="Kanban board"/>
          <TweakSelect label="Layout karet" value={t.boardVariant}
                       options={[
                         { value: 'standard', label: 'Standard (Jira-like)' },
                         { value: 'minimal',  label: 'Minimal (Linear-like)' },
                         { value: 'visual',   label: 'Visual (cover stripe)' },
                       ]}
                       onChange={(v) => setTweak('boardVariant', v)}/>
        </TweaksPanel>
      </NavCtx.Provider>
    </ThemeProvider>
  );
}

// Lightweight global views
function InboxView({ onTaskClick }) {
  const items = window.FLUX_ACTIVITY;
  return (
    <Box sx={{ flex: 1, overflowY: 'auto', p: 3, bgcolor: 'background.default' }}>
      <Box sx={{ maxWidth: 760, mx: 'auto' }}>
        <Box sx={{ fontSize: 22, fontWeight: 700, letterSpacing: '-0.02em', mb: 2 }}>Inbox</Box>
        <Box sx={{ borderRadius: 1.5, border: 1, borderColor: 'divider', bgcolor: 'background.paper', overflow: 'hidden' }}>
          {items.map(a => {
            const u = getUser(a.user);
            return (
              <Box key={a.id} onClick={() => onTaskClick('t1')}
                sx={{ p: 1.5, display: 'flex', gap: 1.25, borderBottom: 1, borderColor: 'divider',
                  cursor: 'default', '&:hover': { bgcolor: 'action.hover' }, '&:last-child': { borderBottom: 0 } }}>
                <FluxAvatar user={u} size={28}/>
                <Box sx={{ flex: 1, minWidth: 0 }}>
                  <Box sx={{ fontSize: 13 }}><b>{u.name}</b> <span style={{ color: 'var(--mui-palette-text-secondary)' }}>{a.action}</span> <span style={{ fontFamily: 'JetBrains Mono', color: '#0ea5e9' }}>{a.target}</span></Box>
                  {a.preview && <Box sx={{ fontSize: 12, color: 'text.secondary', mt: 0.25 }}>{a.preview}</Box>}
                  <Box sx={{ fontSize: 11, color: 'text.disabled', mt: 0.25 }}>{timeAgo(a.at)}</Box>
                </Box>
              </Box>
            );
          })}
        </Box>
      </Box>
    </Box>
  );
}

function MyWorkView({ onTaskClick }) {
  const tasks = window.FLUX_TASKS.filter(t => t.assignee === 'u1' || t.reporter === 'u1');
  return (
    <Box sx={{ flex: 1, overflowY: 'auto', p: 3, bgcolor: 'background.default' }}>
      <Box sx={{ maxWidth: 1100, mx: 'auto' }}>
        <Box sx={{ fontSize: 22, fontWeight: 700, letterSpacing: '-0.02em', mb: 2 }}>Moje práce</Box>
        <Box sx={{ borderRadius: 1.5, border: 1, borderColor: 'divider', bgcolor: 'background.paper', overflow: 'hidden' }}>
          {tasks.map(t => (
            <Box key={t.id} onClick={() => onTaskClick(t.id)}
              sx={{ display: 'flex', alignItems: 'center', gap: 1, px: 1.5, py: 0.85,
                borderBottom: 1, borderColor: 'divider', cursor: 'default',
                '&:hover': { bgcolor: 'action.hover' }, '&:last-child': { borderBottom: 0 } }}>
              <PriorityIcon priority={t.priority}/>
              <TypeIcon type={t.type} size={13}/>
              <Box sx={{ fontSize: 11, color: 'text.disabled', fontFamily: 'JetBrains Mono', minWidth: 60 }}>{t.key}</Box>
              <Box sx={{ fontSize: 13, flex: 1, minWidth: 0, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{t.title}</Box>
              <Box sx={{ display: 'inline-flex', alignItems: 'center', gap: 0.4, px: 0.6, py: 0.2,
                borderRadius: 0.6, bgcolor: 'action.hover', fontSize: 10.5, fontWeight: 600 }}>
                {getStatus(t.status).name}
              </Box>
              <FluxAvatar user={t.assignee ? getUser(t.assignee) : null} size={20}/>
            </Box>
          ))}
        </Box>
      </Box>
    </Box>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
